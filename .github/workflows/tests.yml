name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ironhack
          POSTGRES_DB: peliculas_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:ironhack@localhost:5432/peliculas_db?schema=public
          JWT_SECRET: test-secret-para-ci
          JWT_EXPIRES_IN: 24h

      - run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:ironhack@localhost:5432/peliculas_db?schema=public
          JWT_SECRET: test-secret-para-ci
          JWT_EXPIRES_IN: 24h
